apiVersion: apps/v1
kind: Deployment
metadata:
  name: salesboost-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: salesboost-backend
  template:
    metadata:
      labels:
        app: salesboost-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      # Graceful Shutdown: Spring Boot가 진행 중인 요청을 완료할 때까지 대기 (20s + 여유 10s)
      terminationGracePeriodSeconds: 30
      containers:
        - name: salesboost-backend
          image: ckato9173/salesboost-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
            - containerPort: 8081
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75 -XX:InitialRAMPercentage=50"
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: datasource-url
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
            - name: APP_CORS_ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: APP_CORS_ALLOWED_ORIGINS
            - name: LOGSTASH_HOST
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOGSTASH_HOST
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: SPRING_JPA_HIBERNATE_DDL_AUTO
          volumeMounts:
            - name: uploads-data
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
      volumes:
        # emptyDir: HPA 스케일아웃 시 모든 노드에서 마운트 가능 (PVC RWO 충돌 방지)
        # ⚠️ 주의사항:
        #   1) 파드 재시작 시 업로드 파일 유실됨
        #   2) 멀티 Pod 환경에서 A Pod에 업로드된 파일을 B Pod에서 조회 불가 (404 발생)
        # 근본 해결: AWS S3 / MinIO 오브젝트 스토리지로 파일 업로드 로직 전환
        # 임시 해결: replicas를 1로 고정하거나 AWS EFS(ReadWriteMany) 볼륨 사용
        - name: uploads-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: salesboost-backend
spec:
  selector:
    app: salesboost-backend
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: metrics
      protocol: TCP
      port: 8081
      targetPort: 8081
  type: ClusterIP
