apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-pipeline
  namespace: default
data:
  logstash.conf: |
    input {
      tcp {
        port  => 5001
        codec => json_lines
      }
    }

    filter {
      # logstash-logback-encoder가 @timestamp를 자동 전송하므로 별도 처리 불필요
      # Elasticsearch/Kibana가 @timestamp를 기본 시간 필드로 사용
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "salesboost-logs-%{+YYYY.MM.dd}"
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:7.17.29
          ports:
            - name: tcp-input
              containerPort: 5001
              protocol: TCP
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          volumeMounts:
            - name: pipeline-config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
          readinessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            tcpSocket:
              port: 5001
            initialDelaySeconds: 90
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              memory: "768Mi"
              cpu: "200m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: pipeline-config
          configMap:
            name: logstash-pipeline

---
apiVersion: v1
kind: Service
metadata:
  name: logstash
spec:
  selector:
    app: logstash
  ports:
    - name: tcp-input
      protocol: TCP
      port: 5001
      targetPort: 5001
  type: ClusterIP
