server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;

    # API Proxy: /api/ 요청을 백엔드로 전달
    # set + resolver 조합으로 DNS 해석을 런타임으로 지연 → 백엔드 미기동 시에도 nginx 정상 시작
    # Docker Compose: 127.0.0.11(Docker DNS)이 backend를 해석
    # Kubernetes: Ingress가 /api 라우팅을 처리하므로 이 블록에 요청이 도달하지 않음
    # ⚠️ K8s에서 Ingress 없이 직접 접근 시 resolver를 CoreDNS IP로 변경 필요:
    #    kubectl get svc -n kube-system kube-dns → CLUSTER-IP 확인 후 아래 resolver 교체
    location /api/ {
        resolver 127.0.0.11 valid=10s;
        set $backend_upstream "http://backend:8080";
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Handle Vue Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # CSP: self + 외부 이미지(Unsplash 등) 허용, inline style 허용 (Vue SPA)
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https: data:; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self' data:; connect-src 'self';" always;
    # HSTS: HTTPS 전환 후 활성화하세요 (HTTP 환경에서는 브라우저가 무시함)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
